name: PlatformIO setup
description: Install PlatformIO with cached platforms and packages
inputs:
  install-ripgrep:
    description: apt install ripgrep
    required: false
    default: "false"
  install-gcovr:
    description: apt install gcovr
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - uses: actions/cache@v4
      id: pio-cache
      with:
        path: |
          ~/.platformio/packages
          ~/.platformio/platforms
        key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini', 'firmware/test/golden/profile_test_matrix.json') }}
        restore-keys: |
          pio-${{ runner.os }}-
    - name: Install PlatformIO
      shell: bash
      run: pip install 'platformio>=6.1'
    - name: Install ripgrep
      if: inputs.install-ripgrep == 'true'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq ripgrep
    - name: Install gcovr
      if: inputs.install-gcovr == 'true'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq gcovr
