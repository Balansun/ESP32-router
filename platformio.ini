[env:native-coverage]
extends = env:native
extra_scripts = 
	pre:extra_scripts/native_coverage_flags.py

; Minimal GPIO13 DS18B20 probe — no Balansun app/WiFi/web.
; BALANSUN_UPLOAD_PORT=/dev/cu.usbserial-0001 pio run -e gpio13_debug -t upload
; pio device monitor -e gpio13_debug
[env:gpio13_debug]
platform = espressif32@6.4.0
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter =
	-<*>
	+<test/bench/gpio13_ds18_debug/*>
lib_deps =
	paulstoffregen/OneWire@2.3.7
	milesburton/DallasTemperature@3.11.0
build_flags =
	-DGPIO13_DEBUG_PIN=13

; PSRAM bring-up probe (serial only). BALANSUN_UPLOAD_PORT=… pio run -e psram_probe -t upload
[env:psram_probe]
platform = espressif32@6.4.0
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter =
	-<*>
	+<test/bench/psram_probe/*>
build_flags =
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue

; ESP8266 fil pilote R2-full action node (API-only, no Router metering).
; BALANSUN_UPLOAD_PORT=192.168.x.x pio run -e action_esp8266_r2_3relay -t upload
[env:action_esp8266_common]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
build_src_filter =
	-<*>
	+<action_node/*>
	+<core/ds18b20_temperature_sensor.cpp>
lib_deps =
  file://${PROJECT_DIR}/lib/balansun-core
  bblanchon/ArduinoJson@^7.3.0
  paulstoffregen/OneWire@2.3.7
  milesburton/DallasTemperature@3.11.0
build_flags =
	-Os
	-DBALANSUN_ROLE_ACTION_NODE=1
	-DBALANSUN_TARGET_ESP8266=1
	-I${PROJECT_DIR}/firmware/core
	-I${PROJECT_DIR}/lib/balansun-core/include
	-Wl,--gc-sections
board_build.filesystem = littlefs

[env:action_esp8266_r2_3relay]
extends = env:action_esp8266_common
build_flags =
	${env:action_esp8266_common.build_flags}
	-DBALANSUN_PILOT_WIRE_WIRING=R2_FULL_3RELAY

[env:action_esp8266_r2_2relay]
extends = env:action_esp8266_common
build_flags =
	${env:action_esp8266_common.build_flags}
	-DBALANSUN_PILOT_WIRE_WIRING=R2_FULL_2RELAY

[env:action_esp8266_r2_3relay_ota]
extends = env:action_esp8266_r2_3relay
upload_protocol = espota
upload_port = ${sysenv.BALANSUN_UPLOAD_PORT}

[env:action_esp8266_r2_2relay_ota]
extends = env:action_esp8266_r2_2relay
upload_protocol = espota
upload_port = ${sysenv.BALANSUN_UPLOAD_PORT}

