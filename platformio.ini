; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = wroom32
src_dir = firmware
test_dir = firmware/test/native
extra_configs =
	platformio/meter_packs.ini

[env]
; In-tree domain + platform libraries (vendored from former Balansun-Core).
lib_extra_dirs =
	${PROJECT_DIR}/lib/balansun-core
	${PROJECT_DIR}/lib/balansun-platform

[env:wroom32]
platform = espressif32@6.4.0
board = esp32dev
framework = arduino
build_src_filter = 
	+<*>
	-<test/native>
	-<test/bench>
	-<action_node/*>
board_build.partitions = firmware/partitions.csv
monitor_speed = 115200
extra_scripts = 
	pre:build_web.py
	pre:extra_scripts/set_firmware_version.py
	pre:extra_scripts/patch_remote_debug_ws.py
	pre:extra_scripts/patch_webserver_http.py
build_flags = 
	-Os
	-DCORE_DEBUG_LEVEL=0
	-DBALANSUN_REMOTE_DEBUG=0
	-DBALANSUN_HW_CEILING_CONSTRAINED
	-DBALANSUN_HISTORY_DAYS_RETAINED=7
	-DBALANSUN_PWR_HIST_5MN_SLOTS=288
	-DBALANSUN_PWR_HIST_2S_SLOTS=150
	-DCONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=16384
	-DCONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=8192
	-I${PROJECT_DIR}/firmware/core
	-I${PROJECT_DIR}/firmware/metering
	-I${PROJECT_DIR}/firmware/api
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
lib_deps =
  file://${PROJECT_DIR}/lib/balansun-core
  file://${PROJECT_DIR}/lib/balansun-platform
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.3.0
  paulstoffregen/OneWire@2.3.7
  milesburton/DallasTemperature@3.11.0
  https://github.com/plageoj/urlencode.git

; Pre-release style Version: {base}-{branch}.{short_sha} (same as GitHub main pre-releases).
; Example: pio run -e wroom32_prerelease  → 0.1.0-nightly.abc1234 on main @ abc1234 (CI) or branch slug locally
[env:wroom32_prerelease]
extends = env:wroom32

; Network OTA: BALANSUN_UPLOAD_PORT=192.168.x.x pio run -e wroom32_ota -t upload
[env:wroom32_ota]
extends = env:wroom32
upload_protocol = espota
upload_port = ${sysenv.BALANSUN_UPLOAD_PORT}

; Network OTA (JSY-MK-194 32U router bench): BALANSUN_UPLOAD_PORT=192.168.2.159 pio run -e esp32_32u_jsy_router_ota -t upload
[env:esp32_32u_jsy_router_ota]
extends = env:esp32_32u_jsy_router
upload_protocol = espota
upload_port = ${sysenv.BALANSUN_UPLOAD_PORT}

; JSY-MK-194 32U full router (single meter pack + FULL_ROUTER caps)
[env:esp32_32u_jsy_full_router_ota]
extends = env:esp32_32u_jsy_full_router
upload_protocol = espota
upload_port = ${sysenv.BALANSUN_UPLOAD_PORT}

; Bench recovery after EEPROM/flash erase: embed lab Wi-Fi at compile time (no secrets in repo).
; BALANSUN_LAB_WIFI_SSID='MyLan' BALANSUN_LAB_WIFI_PASSWORD='secret' pio run -e wroom32_lab -t upload
[env:wroom32_lab]
extends = env:wroom32
extra_scripts =
	${env:wroom32.extra_scripts}
	pre:extra_scripts/set_lab_wifi_flags.py

; Pmqtt router + embedded lab Wi-Fi (same as wroom32_lab).
; BALANSUN_LAB_WIFI_SSID='GrimmChester' BALANSUN_LAB_WIFI_PASSWORD='…' pio run -e pmqtt_router_lab -t upload
[env:pmqtt_router_lab]
extends = env:pmqtt_router
extra_scripts =
	${env:pmqtt_router.extra_scripts}
	pre:extra_scripts/set_lab_wifi_flags.py

[env:hil]
extends = env:wroom32
build_unflags = 
	-DBALANSUN_REMOTE_DEBUG=0
build_flags = 
	${env:wroom32.build_flags}
	-DBALANSUN_REMOTE_DEBUG=1
	-DBALANSUN_ENABLE_SOURCE_TEST_API=1
lib_deps = 
	${env:wroom32.lib_deps}
	https://github.com/JoaoLopesF/RemoteDebug.git


; HIL matrix: boot into captive setup AP (no STA). Flash then open http://192.168.4.1
[env:hil_test_ap]
extends = env:hil
build_flags =
	${env:hil.build_flags}
	-DBALANSUN_HIL_FORCE_AP=1

; HIL matrix: join lab LAN at compile time, then apply home fixture over REST.
; BALANSUN_LAB_WIFI_SSID='MyLan' BALANSUN_LAB_WIFI_PASSWORD='secret' pio run -e hil_test_standard -t upload
[env:hil_test_standard]
extends = env:hil
upload_protocol = espota
upload_port = ${sysenv.BALANSUN_UPLOAD_PORT}
extra_scripts =
	${env:hil.extra_scripts}
	pre:extra_scripts/set_lab_wifi_flags.py

[env:esp32s3]
extends = env:wroom32
board = esp32-s3-devkitc-1
board_build.partitions = firmware/partitions_s3.csv
; DevKitC-1 has two USB-C ports — use both for bench work:
;   Native (303A:1001)  e.g. /dev/cu.usbmodem1101  — Serial monitor (USB CDC, default below)
;   UART bridge (1A86)  e.g. /dev/cu.usbmodem5C381870071 — alternate upload / serial if CDC off
; Upload:  BALANSUN_UPLOAD_PORT=/dev/cu.usbmodem1101  (native) or WCH path above
; Monitor: BALANSUN_MONITOR_PORT=/dev/cu.usbmodem5C381870071 (UART0) or native USB CDC
upload_protocol = esptool
upload_port = ${sysenv.BALANSUN_UPLOAD_PORT}
; partitions_s3.csv places ota_0 @ 0x20000 (enlarged NVS); Arduino default is 0x10000.
board_upload.offset_address = 0x20000
; Default: DevKitC-1-N8 (no OPI PSRAM). For N8R8 modules use env esp32s3_opi.
board_build.arduino.memory_type = qio_qspi
build_unflags =
	-DBALANSUN_HISTORY_DAYS_RETAINED=7
	-DBALANSUN_PWR_HIST_5MN_SLOTS=288
	-DBALANSUN_PWR_HIST_2S_SLOTS=150
build_flags =
	${env:wroom32.build_flags}
	-DBALANSUN_HW_CEILING_EXTENDED
	-DBALANSUN_HISTORY_DAYS_RETAINED=90
	-DBALANSUN_PWR_HIST_5MN_SLOTS=600
	-DBALANSUN_PWR_HIST_2S_SLOTS=300
	-DRGB_BRIGHTNESS=64
monitor_speed = 115200
monitor_port = ${sysenv.BALANSUN_MONITOR_PORT}
monitor_filters = esp32_exception_decoder, direct
lib_deps =
	${env:wroom32.lib_deps}

; S3 with octal PSRAM (DevKitC-1-N8R8 / WROOM-S3 modules).
[env:esp32s3_opi]
extends = env:esp32s3
board_build.arduino.memory_type = qio_opi
build_flags =
	${env:esp32s3.build_flags}
	-DBOARD_HAS_PSRAM

; Reference module: 16 MB flash + 8 MB OPI PSRAM (N16R8).
[env:esp32s3_n16r8]
extends = env:esp32s3_opi
board_build.flash_size = 16MB
board_upload.flash_size = 16MB

; Alias for older scripts/docs (same as esp32s3).
[env:esp32s3_nopsram]
extends = env:esp32s3

; Network OTA (S3 bench): BALANSUN_UPLOAD_PORT=192.168.2.107 pio run -e esp32s3_ota -t upload
[env:esp32s3_ota]
extends = env:esp32s3
upload_protocol = espota
upload_port = ${sysenv.BALANSUN_UPLOAD_PORT}

; ESP32-WROVER-32 = wroom32 + BOARD_HAS_PSRAM (+ extended history tier). wroom32 alone
; does not call psramInit(); psramFound() stays false even on WROVER modules.
[env:wrover32]
extends = env:wroom32
build_unflags =
	-DBALANSUN_HISTORY_DAYS_RETAINED=7
	-DBALANSUN_PWR_HIST_5MN_SLOTS=288
	-DBALANSUN_PWR_HIST_2S_SLOTS=150
build_flags =
	${env:wroom32.build_flags}
	-DBALANSUN_HW_CEILING_EXTENDED
	-DBALANSUN_HISTORY_DAYS_RETAINED=30
	-DBALANSUN_PWR_HIST_5MN_SLOTS=600
	-DBALANSUN_PWR_HIST_2S_SLOTS=300
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
lib_deps =
	${env:wroom32.lib_deps}

; Alias kept for scripts/CI (same as wrover32).
[env:wrover]
extends = env:wrover32

[env:esp32c3_meter]
extends = env:jsy_mk194_meter
board = esp32-c3-devkitm-1
build_src_filter = 
	+<*>
	-<test/native>
lib_deps =
	${env:wroom32.lib_deps}

[env:native]
platform = native
test_framework = googletest
test_build_src = true
test_filter = *
lib_deps =
	file://${PROJECT_DIR}/lib/balansun-core
build_flags = 
	-std=gnu++17
	-DFLEET_BUNDLE_NATIVE_STUB=1
	-DAPI_TOKEN_NATIVE_STUB=1
	-DBALANSUN_PRODUCT_PROFILE=BALANSUN_PRODUCT_FULL_ROUTER
	-I${PROJECT_DIR}/firmware/test/native/stubs
	-I${PROJECT_DIR}/firmware/core
	-I${PROJECT_DIR}/firmware/metering
build_src_filter = 
	-<*>
	+<core/api_util_logic.cpp>
	+<core/api_session_logic.cpp>
	+<core/json_field_parse.cpp>
	+<core/actions_logic.cpp>
	+<core/balansun_meter_logic.cpp>
	+<core/balansun_regulation_logic.cpp>
	+<core/balansun_regulation_state.cpp>
	+<core/balansun_regulation_persist.cpp>
	+<metering/storage_eeprom_layout.cpp>
	+<metering/storage_eeprom_ram.cpp>
	+<metering/storage_eeprom_extension.cpp>
	+<metering/jsy_mk194_logic.cpp>
	+<metering/linky_tic_logic.cpp>
	+<metering/shelly_em_logic.cpp>
	+<core/balansun_source_logic.cpp>
	+<core/actions_api_logic.cpp>
	+<core/mqtt_ha_logic.cpp>
	+<core/mqtt_ha_command_logic.cpp>
	+<core/balansun_meter_json_logic.cpp>
	+<core/day_replay_logic.cpp>
	+<metering/json_flat_meter_logic.cpp>
	+<metering/external_peer_logic.cpp>
	+<metering/tempo_rte_logic.cpp>
	+<metering/balansun_http_response_logic.cpp>
	+<metering/pmqtt_logic.cpp>
	+<metering/jsy_mk333_logic.cpp>
	+<core/balansun_pwm_logic.cpp>
	+<core/balansun_pulse_modes_tables.cpp>
	+<core/fleet_bundle_logic.cpp>
	+<core/api_token_logic.cpp>
	+<core/api_access_token.cpp>
	+<core/uxi_adc_clip_logic.cpp>
	+<core/balansun_source_health_logic.cpp>
	+<core/balansun_regulation_hunting_logic.cpp>
	+<core/balansun_vacation_logic.cpp>
	+<core/balansun_action_cap_logic.cpp>
	+<core/balansun_site_cap_logic.cpp>
	+<core/balansun_ha_site_persist.cpp>
	+<core/mqtt_ha_events_logic.cpp>
	+<core/mqtt_ha_json_config_logic.cpp>
	+<core/balansun_config_audit_keys.cpp>
	+<core/balansun_device_id_logic.cpp>
	+<core/balansun_config_daily_cap_logic.cpp>
	+<core/balansun_hw_profile_logic.cpp>
	+<core/balansun_status_led_logic.cpp>
	+<core/balansun_api_ready_logic.cpp>
